deptrac:
  paths:
    - ./src
  layers:
    - name: Enums
      collectors:
        - type: directory
          value: src/Enums/.*
    - name: Exceptions
      collectors:
        - type: directory
          value: src/Exceptions/.*
    - name: DTO
      collectors:
        - type: directory
          value: src/DTO/.*
    - name: Contracts
      collectors:
        - type: directory
          value: src/Contracts/.*
    - name: Concerns
      collectors:
        - type: directory
          value: src/Concerns/.*
        - type: classLike
          value: .*\\Billable$
    - name: Builders
      collectors:
        - type: directory
          value: src/Builders/.*
    - name: Events
      collectors:
        - type: directory
          value: src/Events/.*
    - name: Models
      collectors:
        - type: directory
          value: src/Models/.*
    - name: Invoice
      collectors:
        - type: directory
          value: src/Invoice/.*
    - name: Gateway
      collectors:
        - type: directory
          value: src/Gateway/.*
    - name: Facades
      collectors:
        - type: directory
          value: src/Facades/.*
    - name: Manager
      collectors:
        - type: classLike
          value: .*CashierManager
    - name: ServiceProvider
      collectors:
        - type: classLike
          value: .*CashierSupportServiceProvider
    - name: HttpClient
      collectors:
        - type: classLike
          value: GuzzleHttp\\.*
        - type: classLike
          value: Illuminate\\Http\\Client\\.*
        - type: classLike
          value: Symfony\\Component\\HttpClient\\.*

  ruleset:
    # Foundation layers depend on nothing internal.
    Enums: ~

    Exceptions:
      - Enums

    # DTO and Contracts are intentionally co-dependent: DTOs are the operation
    # payloads, while DTO\PaymentMethod type-hints the PaymentMethodType contract.
    DTO:
      - Enums
      - Contracts
    Contracts:
      - Enums
      - Exceptions
      - DTO

    Events:
      - Enums
      - DTO

    # Models resolve their per-driver relations through the manager registry
    # (via the facade).
    Models:
      - Enums
      - Facades

    Invoice:
      - Enums
      - DTO

    # The manager owns the per-driver model registry, hence the Models edge.
    Manager:
      - Enums
      - Exceptions
      - Contracts
      - Models

    # Facades mirror the manager's typed API, including model-registry types.
    Facades:
      - Manager
      - Contracts
      - Enums
      - Models

    # The capability gate a Concern hands back to the caller. Exceptions is not
    # from an import: the builder inherits the @throws surface its contract
    # declares, and deptrac resolves that too.
    Builders:
      - Enums
      - Exceptions
      - Contracts
      - DTO
      - Facades

    Concerns:
      - Enums
      - Exceptions
      - DTO
      - Contracts
      - Facades
      - Models
      - Builders

    # Driver-side defaults (local invoice operations) composed into gateways.
    Gateway:
      - Enums
      - Exceptions
      - DTO
      - Contracts
      - Facades
      - Models
      - Invoice

    ServiceProvider:
      - Manager

    # HttpClient is intentionally unreachable: no layer may depend on it, which
    # enforces the "zero HTTP calls" rule for this package.
    HttpClient: ~
