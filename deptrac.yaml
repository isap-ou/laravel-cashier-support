deptrac:
  paths:
    - ./src
  layers:
    - name: Enums
      collectors:
        - type: directory
          value: src/Enums/.*
    - name: Casts
      collectors:
        - type: directory
          value: src/Casts/.*
    - name: Exceptions
      collectors:
        - type: directory
          value: src/Exceptions/.*
    - name: DTO
      collectors:
        - type: directory
          value: src/DTO/.*
    - name: Contracts
      collectors:
        - type: directory
          value: src/Contracts/.*
    - name: Concerns
      collectors:
        - type: directory
          value: src/Concerns/.*
        - type: classLike
          value: .*\\Billable$
    - name: Builders
      collectors:
        - type: directory
          value: src/Builders/.*
    - name: Events
      collectors:
        - type: directory
          value: src/Events/.*
    - name: Models
      collectors:
        - type: directory
          value: src/Models/.*
    - name: Invoice
      collectors:
        - type: directory
          value: src/Invoice/.*
    - name: Gateway
      collectors:
        - type: directory
          value: src/Gateway/.*
    - name: Facades
      collectors:
        - type: directory
          value: src/Facades/.*
    - name: Http
      collectors:
        - type: directory
          value: src/Http/.*
    - name: Console
      collectors:
        - type: directory
          value: src/Console/.*
    - name: Testing
      collectors:
        - type: directory
          value: src/Testing/.*
    - name: Manager
      collectors:
        - type: classLike
          value: .*CashierManager
    - name: ServiceProvider
      collectors:
        - type: classLike
          value: .*CashierSupportServiceProvider
    - name: HttpClient
      collectors:
        - type: classLike
          value: GuzzleHttp\\.*
        - type: classLike
          value: Illuminate\\Http\\Client\\.*
        - type: classLike
          value: Symfony\\Component\\HttpClient\\.*
    - name: SymfonyHttpException
      collectors:
        - type: classLike
          value: Symfony\\Component\\HttpKernel\\Exception\\.*

  ruleset:
    # Foundation layers depend on nothing internal.
    Enums: ~

    # Currency casts wrap moneyphp (external) — no internal dependency.
    Casts: ~

    Exceptions:
      - Enums

    # DTO and Contracts are intentionally co-dependent: DTOs are the operation
    # payloads, while DTO\PaymentMethod type-hints the PaymentMethodType contract.
    DTO:
      - Enums
      - Casts
      - Contracts
    Contracts:
      - Enums
      - Exceptions
      - DTO

    Events:
      - Enums
      - DTO

    # Models resolve their per-driver relations through the manager registry (via the facade).
    # The Exceptions edge is the lifecycle mutators' documented @throws surface (#39): they
    # surface UnsupportedOperationException from the guarded provider, which deptrac resolves off
    # the @throws tag. Acyclic — Exceptions depends only on Enums.
    Models:
      - Enums
      - Casts
      - Facades
      - Exceptions

    Invoice:
      - Enums
      - Casts
      - DTO

    # The manager owns the per-driver model registry (Models edge) and wraps every driver in
    # the capability guard (Gateway edge): provider() returns a Gateway\GuardedProvider. Both
    # close a cycle with Facades — Models and the guard reach back through the facade — which is
    # the facade-proxy pattern this package already runs on, not a new smell.
    Manager:
      - Enums
      - Casts
      - Exceptions
      - Contracts
      - Models
      - Gateway

    # Facades mirror the manager's typed API, including model-registry types.
    # The Testing edge is Cashier::fake(), which builds and registers a FakeGateway.
    Facades:
      - Manager
      - Contracts
      - Enums
      - Models
      - Testing

    # The capability gate a Concern hands back to the caller. Exceptions is not
    # from an import: the builder inherits the @throws surface its contract
    # declares, and deptrac resolves that too.
    Builders:
      - Enums
      - Exceptions
      - Contracts
      - DTO
      - Facades

    Concerns:
      - Enums
      - Exceptions
      - DTO
      - Contracts
      - Facades
      - Models
      - Builders

    # Driver-side defaults (local invoice operations) composed into gateways, plus
    # GuardedProvider — the capability guard Cashier::provider() wraps every driver in.
    # It composes the builder guard (Builders): its newSubscription() hands back a
    # GuardedSubscriptionBuilder, so setter-gating is created at the same one boundary as
    # operation-gating and a direct provider() call cannot get an unguarded builder. Acyclic
    # — Builders depends on Contracts/DTO/Facades, never on Gateway.
    Gateway:
      - Enums
      - Exceptions
      - DTO
      - Contracts
      - Facades
      - Models
      - Invoice
      - Builders

    # The webhook entry point every driver shares; its whole job is to dispatch the Events
    # in an order a driver no longer chooses. It reaches a driver through the Manager and
    # NOT through the Facade, which is the one place that departs from the rule Concerns
    # follow: a facade proxies through docblock method-tags, which cannot carry throws
    # information, so every catch in the controller would read as dead to static analysis
    # while being exactly the paths that matter.
    Http:
      - Exceptions
      - Contracts
      - Events
      - Manager

    # Registers a webhook endpoint at whichever gateway can do it over its API.
    Console:
      - Exceptions
      - Contracts
      - DTO
      - Manager

    # Shipped test doubles: the FakeGateway and its collaborators implement the
    # Contracts against the DTO payloads and Enums, and inherit the contracts'
    # @throws surface (Exceptions), which deptrac resolves as it does for Builders.
    # The conformance TestCase also names the ServiceProvider in getPackageProviders().
    Testing:
      - Enums
      - Exceptions
      - DTO
      - Contracts
      - ServiceProvider
      # Models, for the four Fake* records Cashier::fake() binds — and for nothing else.
      # Models\* are abstract so each driver names its own concrete class, which left
      # Cashier::fake() unable to answer $user->subscribed(): there was no concrete class
      # to register for the [fake] driver, and no service provider to register it from.
      # Supplying one means extending the abstract base, so this edge is intrinsic — the
      # fake is doing exactly what a driver does, and a driver is allowed to.
      #
      # It is a narrow allowance, not an opening: Testing still may not reach Concerns,
      # Builders, Gateway, Invoice, Manager or Casts, so a test double cannot grow into a
      # second implementation of the package.
      - Models
      # Models\Invoice casts through CurrencyEloquentCast, so extending it pulls Casts in
      # by inheritance rather than by choice. Same for Facades: the abstract models reach
      # the gateway and the model registry through Cashier::, so a concrete subclass
      # inherits that edge whether it wants it or not. Both are consequences of extending,
      # not new couplings the fake introduces.
      - Casts
      - Facades

    ServiceProvider:
      - Manager
      - Console

    # HttpClient is intentionally unreachable: no layer may depend on it, which
    # enforces the "zero HTTP calls" rule for this package.
    HttpClient: ~

    # Symfony HTTP exceptions are intentionally unreachable too: a domain layer
    # signals "not found" with a catchable CashierException (InvoiceNotFoundException),
    # never a framework HTTP response the caller cannot catch as a billing fact (#68).
    SymfonyHttpException: ~
