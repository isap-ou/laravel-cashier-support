name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { laravel: 11, testbench: 9, php: '8.2', stability: prefer-stable }
          - { laravel: 12, testbench: 10, php: '8.2', stability: prefer-lowest }
          - { laravel: 12, testbench: 10, php: '8.3', stability: prefer-stable }
          - { laravel: 12, testbench: 10, php: '8.4', stability: prefer-stable }
          - { laravel: 13, testbench: 11, php: '8.4', stability: prefer-stable }

    name: L${{ matrix.laravel }} - PHP ${{ matrix.php }} - ${{ matrix.stability }}

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: intl
          coverage: none

      - name: Constrain framework version
        run: >
          composer require --no-update --no-interaction
          "illuminate/contracts:^${{ matrix.laravel }}.0"
          "orchestra/testbench:^${{ matrix.testbench }}.0"

      # Laravel 11 is past its security-support window; all 11.x releases are
      # flagged by Composer's advisory audit. Allow the install so we can still
      # verify compatibility. Newer, supported lines (12/13) keep the audit on.
      - name: Allow EOL framework install
        if: matrix.laravel == 11
        run: composer config audit.block-insecure false

      - name: Install dependencies
        run: composer update --${{ matrix.stability }} --prefer-dist --no-interaction

      - name: Run tests
        run: composer test

  quality:
    runs-on: ubuntu-latest
    name: static analysis & style

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: intl
          coverage: none

      - name: Install dependencies
        run: composer update --prefer-stable --prefer-dist --no-interaction

      - name: PHPStan
        run: composer analyse

      - name: Deptrac
        run: composer deptrac

      - name: Pint
        run: vendor/bin/pint --test
