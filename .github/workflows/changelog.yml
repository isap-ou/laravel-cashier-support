name: changelog

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

jobs:
  enforce:
    runs-on: ubuntu-latest
    name: CHANGELOG updated
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip changelog') }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure CHANGELOG.md was updated
        run: |
          git fetch --no-tags --depth=200 origin "${{ github.base_ref }}"
          if git diff --name-only "origin/${{ github.base_ref }}...HEAD" | grep -qx 'CHANGELOG.md'; then
            echo "CHANGELOG.md was updated."
          else
            echo "::error::CHANGELOG.md was not updated. Add an entry under [Unreleased], or apply the 'skip changelog' label to bypass."
            exit 1
          fi
